<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>孩子注意力不集中怎麼辦 — 學前幼兒生活島</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Fraunces:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  font-family:'Noto Sans TC','Helvetica Neue',sans-serif;
  background:#f3ecdf;color:#2b1d12;
  min-height:100vh;
  background:
    radial-gradient(circle at 20% 0%, #fff5dc 0%, transparent 40%),
    radial-gradient(circle at 80% 100%, #ffe1ec 0%, transparent 40%),
    #f3ecdf;
}
.wrap{max-width:560px;margin:0 auto;padding:24px 20px max(40px, env(safe-area-inset-bottom))}
.back-btn{
  display:inline-flex;align-items:center;gap:6px;
  font-size:13px;color:#8a6a3d;
  font-family:'Fraunces',serif;font-style:italic;
  text-decoration:none;margin-bottom:24px;
}
.back-btn svg{width:14px;height:14px}
.eyebrow{
  font-family:'Fraunces',serif;font-style:italic;
  font-size:13px;color:#a87a3e;letter-spacing:0.05em;
  margin-bottom:6px;
}
h1{
  font-size:28px;font-weight:700;color:#2b1d12;
  letter-spacing:0.02em;line-height:1.3;
  margin-bottom:6px;
}
.subtitle{
  font-family:'Fraunces',serif;font-style:italic;
  font-size:15px;color:#8a6a3d;
  margin-bottom:32px;
}

.scenario-list{display:flex;flex-direction:column;gap:12px}
.scenario-card{
  display:flex;align-items:center;gap:16px;
  background:#fff;
  border:1px solid rgba(201,168,120,0.4);
  border-radius:14px;
  padding:16px 18px;
  text-decoration:none;
  color:#2b1d12;
  transition:transform 0.15s,box-shadow 0.2s,border-color 0.2s;
  box-shadow:0 1px 3px rgba(70,40,10,0.04);
}
.scenario-card:hover{
  transform:translateY(-2px);
  border-color:#c08338;
  box-shadow:0 6px 16px -4px rgba(70,40,10,0.18);
}
.scenario-card:active{transform:translateY(0)}
.scenario-num{
  flex:0 0 44px;height:44px;
  border-radius:50%;
  background:#fff5dc;
  color:#c08338;
  font-family:'Fraunces',serif;font-style:italic;font-weight:500;
  font-size:18px;
  display:flex;align-items:center;justify-content:center;
}
.scenario-info{flex:1;min-width:0}
.scenario-zh{
  font-size:16px;font-weight:500;color:#2b1d12;
  line-height:1.3;margin-bottom:2px;
}
.scenario-en{
  font-family:'Fraunces',serif;font-style:italic;
  font-size:12px;color:#8a6a3d;
  line-height:1.3;
}
.arrow{
  flex:0 0 auto;color:#c9a878;
}
.arrow svg{width:18px;height:18px}
</style>
</head>
<body>
<div class="wrap">
  <a href="../" class="back-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    返回主頁
  </a>
  <div class="eyebrow">Helping a Distracted Child</div>
  <h1>孩子注意力不集中怎麼辦</h1>
  <p class="subtitle">共 5 個情境</p>

  <div class="scenario-list">
    <a class="scenario-card" href="01/">
      <div class="scenario-num">01</div>
      <div class="scenario-info">
        <div class="scenario-zh">建立形與耐力</div>
        <div class="scenario-en">Building Form and Patience</div>
      </div>
      <div class="arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>
    </a>
    <a class="scenario-card" href="02/">
      <div class="scenario-num">02</div>
      <div class="scenario-info">
        <div class="scenario-zh">聽說與靜態活動</div>
        <div class="scenario-en">Listening and Quiet Play</div>
      </div>
      <div class="arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>
    </a>
    <a class="scenario-card" href="03/">
      <div class="scenario-num">03</div>
      <div class="scenario-info">
        <div class="scenario-zh">動態運動有助益</div>
        <div class="scenario-en">Active Play Helps Too</div>
      </div>
      <div class="arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>
    </a>
    <a class="scenario-card" href="04/">
      <div class="scenario-num">04</div>
      <div class="scenario-info">
        <div class="scenario-zh">別打斷孩子的專注</div>
        <div class="scenario-en">Don't Interrupt Their Focus</div>
      </div>
      <div class="arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>
    </a>
    <a class="scenario-card" href="05/">
      <div class="scenario-num">05</div>
      <div class="scenario-info">
        <div class="scenario-zh">提供良好的學習環境</div>
        <div class="scenario-en">Provide a Good Learning Environment</div>
      </div>
      <div class="arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>
    </a>
  </div>
</div>
</body>
</html>
